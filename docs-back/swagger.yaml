basePath: /api/v1
definitions:
  add_workspace_member.AddWorkspaceMemberRequest:
    properties:
      role:
        type: string
      user_id:
        type: string
    type: object
  add_workspace_member.AddWorkspaceMemberResponse:
    properties:
      invited_at:
        type: string
      invited_by:
        type: string
      role:
        type: string
      user_id:
        type: string
      workspace_id:
        type: string
    type: object
  create_monitoring_config.CreateMonitoringConfigRequest:
    properties:
      block_ads_cookies:
        type: boolean
      check_frequency:
        description: '"5m", "1h", "1d"'
        type: string
      page_id:
        type: string
      schedule_type:
        description: '"continuous", "scheduled"'
        type: string
      timezone:
        description: '"UTC", "America/New_York", etc'
        type: string
    type: object
  create_monitoring_config.CreateMonitoringConfigResponse:
    properties:
      block_ads_cookies:
        type: boolean
      check_frequency:
        type: string
      created_at:
        type: string
      id:
        type: string
      page_id:
        type: string
      schedule_type:
        type: string
      timezone:
        type: string
    type: object
  create_notification_preference.CreateNotificationPreferenceRequest:
    properties:
      change_types:
        items:
          type: string
        type: array
      email_enabled:
        type: boolean
      page_id:
        type: string
      user_id:
        type: string
      workspace_id:
        type: string
    type: object
  create_notification_preference.CreateNotificationPreferenceResponse:
    properties:
      change_types:
        items:
          type: string
        type: array
      created_at:
        type: string
      email_enabled:
        type: boolean
      id:
        type: string
      page_id:
        type: string
      user_id:
        type: string
      workspace_id:
        type: string
    type: object
  createalert.CreateAlertRequest:
    properties:
      check_id:
        type: string
      description:
        type: string
      metadata:
        $ref: '#/definitions/entities.Metadata'
      page_id:
        type: string
      title:
        type: string
      type:
        type: string
      workspace_id:
        type: string
    required:
    - check_id
    - page_id
    - title
    - type
    - workspace_id
    type: object
  createalert.CreateAlertResponse:
    properties:
      check_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      metadata:
        $ref: '#/definitions/entities.Metadata'
      page_id:
        type: string
      title:
        type: string
      type:
        type: string
      workspace_id:
        type: string
    type: object
  createcheck.CreateCheckRequest:
    properties:
      change_detected:
        type: boolean
      change_type:
        type: string
      duration_ms:
        type: integer
      error_message:
        type: string
      html_snapshot_url:
        type: string
      page_id:
        type: string
      screenshot_url:
        type: string
      status:
        type: string
    required:
    - page_id
    - status
    type: object
  createcheck.CreateCheckResponse:
    properties:
      change_detected:
        type: boolean
      change_type:
        type: string
      checked_at:
        type: string
      id:
        type: string
      page_id:
        type: string
      status:
        type: string
    type: object
  createpage.CreatePageRequest:
    properties:
      name:
        type: string
      url:
        type: string
      workspace_id:
        type: string
    required:
    - name
    - url
    - workspace_id
    type: object
  createpage.CreatePageResponse:
    properties:
      check_count:
        type: integer
      check_frequency:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      detected_changes:
        type: integer
      id:
        type: string
      last_change_detected_at:
        type: string
      last_checked_at:
        type: string
      name:
        type: string
      tags:
        items:
          type: string
        type: array
      thumbnail_url:
        type: string
      updated_at:
        type: string
      url:
        type: string
      workspace_id:
        type: string
    type: object
  createworkspace.CreateWorkspaceRequest:
    properties:
      name:
        type: string
      type:
        type: string
    required:
    - name
    - type
    type: object
  createworkspace.CreateWorkspaceResponse:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      id:
        type: string
      name:
        type: string
      type:
        type: string
    type: object
  entities.Metadata:
    additionalProperties: true
    type: object
  get_current_user.Response:
