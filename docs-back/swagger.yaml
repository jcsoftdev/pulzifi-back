        type: string
    type: object
host: localhost:9090
info:
  contact:
    email: support@pulzifi.com
    name: API Support
  description: Pulzifi backend monolith API
  license:
    name: MIT
  title: Pulzifi API
  version: "1.0"
paths:
  /alerts:
    get:
      description: List all alerts for the current workspace
      parameters:
      - description: Workspace ID (optional filter)
        in: query
        name: workspace_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List Alerts
      tags:
      - alerts
    post:
      consumes:
      - application/json
      description: Create a new alert
      parameters:
      - description: Create Alert Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/createalert.CreateAlertRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/createalert.CreateAlertResponse'
      security:
      - BearerAuth: []
      summary: Create Alert
      tags:
      - alerts
  /alerts/{id}:
    delete:
      description: Delete an alert
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Delete Alert
      tags:
      - alerts
    get:
      description: Get an alert by ID
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get Alert
      tags:
      - alerts
    put:
      consumes:
      - application/json
      description: Update an alert
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: string
      - description: Update Alert Request
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update Alert
      tags:
      - alerts
  /api/organizations:
    post:
      consumes:
      - application/json
      description: Create a new organization with the provided name and subdomain
      parameters:
      - description: Create Organization Request
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create Organization
      tags:
      - organizations
  /api/organizations/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve organization details by ID
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.GetOrganizationResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get Organization
      tags:
      - organizations
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/login.Request'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/login.Response'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout the current user
      produces:
