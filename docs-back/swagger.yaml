      created_at:
        type: string
      created_by:
        type: string
      detected_changes:
        type: integer
      id:
        type: string
      last_change_detected_at:
        type: string
      last_checked_at:
        type: string
      name:
        type: string
      tags:
        items:
          type: string
        type: array
      thumbnail_url:
        type: string
      updated_at:
        type: string
      url:
        type: string
      workspace_id:
        type: string
    type: object
  listworkspaces.ListWorkspacesResponse:
    properties:
      workspaces:
        items:
          $ref: '#/definitions/listworkspaces.Workspace'
        type: array
    type: object
  listworkspaces.Workspace:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      id:
        type: string
      name:
        type: string
      type:
        type: string
    type: object
  login.Request:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  login.Response:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      tenant:
        description: First organization subdomain
        type: string
      token_type:
        type: string
    type: object
  refresh_token.Request:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  refresh_token.Response:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  register.Request:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  register.Response:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      message:
        type: string
      user_id:
        type: string
    type: object
  updatemonitoringconfig.UpdateMonitoringConfigRequest:
    properties:
      block_ads_cookies:
        type: boolean
      check_frequency:
        type: string
      schedule_type:
        type: string
